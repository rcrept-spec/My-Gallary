<!DOCTYPE html>
<html>
<head>
  <title>Analytics Dashboard</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: #eee;
    }

    h2 {
      margin-bottom: 10px;
    }

    .panel {
      background: #1e1e1e;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
    }

    select, button {
      padding: 6px;
      margin-right: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a1a;
    }

    th, td {
      border: 1px solid #333;
      padding: 8px;
      font-size: 13px;
    }

    th {
      background: #222;
      color: #fff;
    }

    tr:nth-child(even) {
      background: #151515;
    }

    .stats {
      margin-bottom: 10px;
      font-size: 13px;
      color: #ccc;
    }
  </style>
</head>

<body>

<h2>Analytics Dashboard</h2>

<div class="panel">
  <div class="stats" id="statsBox">Loading stats...</div>

  <select id="linkFilter">
    <option value="">All Links</option>
  </select>

  <select id="countryFilter">
    <option value="">All Countries</option>
  </select>

  <select id="botFilter">
    <option value="">All Traffic</option>
    <option value="human">Humans Only</option>
    <option value="bot">Bots Only</option>
  </select>

  <button onclick="applyFilters()">Apply</button>
</div>

<table>
  <thead>
    <tr>
      <th>Link</th>
      <th>Country</th>
      <th>Region</th>
      <th>City</th>
      <th>Timezone</th>
      <th>IP</th>
      <th>Referrer</th>
      <th>User Agent</th>
      <th>Bot</th>
      <th>Score</th>
    </tr>
  </thead>

  <tbody id="rows"></tbody>
</table>

<script>

let rawData = [];
let filteredData = [];

function normalize(v) {
  return (v ?? "").toString();
}

/* -------------------------
   LOAD DATA (FROM API)
--------------------------*/
async function loadData() {
  try {
    const res = await fetch("/api/clicks");
    rawData = await res.json();

    console.log("Loaded rows:", rawData.length);

    buildFilters(rawData);
    applyFilters();
    loadStats();

  } catch (err) {
    console.error(err);

    document.getElementById("rows").innerHTML =
      `<tr><td colspan="10">Failed to load data</td></tr>`;
  }
}

/* -------------------------
   BUILD FILTER OPTIONS
--------------------------*/
function buildFilters(data) {
  const linkSet = new Set();
  const countrySet = new Set();

  data.forEach(r => {
    if (r.link_id) linkSet.add(r.link_id);
    if (r.country) countrySet.add(r.country);
  });

  const linkFilter = document.getElementById("linkFilter");
  const countryFilter = document.getElementById("countryFilter");

  linkSet.forEach(v => {
    if (![...linkFilter.options].some(o => o.value === v)) {
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      linkFilter.appendChild(opt);
    }
  });

  countrySet.forEach(v => {
    if (![...countryFilter.options].some(o => o.value === v)) {
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      countryFilter.appendChild(opt);
    }
  });
}

/* -------------------------
   APPLY FILTERS
--------------------------*/
function applyFilters() {
  const link = document.getElementById("linkFilter").value;
  const country = document.getElementById("countryFilter").value;
  const bot = document.getElementById("botFilter").value;

  filteredData = rawData;

  if (link) {
    filteredData = filteredData.filter(r => r.link_id === link);
  }

  if (country) {
    filteredData = filteredData.filter(r => r.country === country);
  }

  if (bot === "human") {
    filteredData = filteredData.filter(r => !r.is_bot);
  }

  if (bot === "bot") {
    filteredData = filteredData.filter(r => r.is_bot);
  }

  renderTable(filteredData);
}

/* -------------------------
   RENDER TABLE
--------------------------*/
function renderTable(data) {
  const rows = document.getElementById("rows");
  rows.innerHTML = "";

  if (!data.length) {
    rows.innerHTML = `<tr><td colspan="10">No data found</td></tr>`;
    return;
  }

  data.forEach(r => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${normalize(r.link_id)}</td>
      <td>${normalize(r.country)}</td>
      <td>${normalize(r.region)}</td>
      <td>${normalize(r.city)}</td>
      <td>${normalize(r.timezone)}</td>
      <td>${normalize(r.ip)}</td>
      <td>${normalize(r.referrer)}</td>
      <td>${normalize(r.user_agent)}</td>
      <td>${r.is_bot ? "YES" : "NO"}</td>
      <td>${r.bot_score || 0}</td>
    `;

    rows.appendChild(tr);
  });
}

/* -------------------------
   STATS (FROM YOUR API)
--------------------------*/
async function loadStats() {
  try {
    const res = await fetch("/api/stats");
    const data = await res.json();

    document.getElementById("statsBox").innerText =
      Object.entries(data)
        .map(([k, v]) => `${k}: ${v}`)
        .join(" | ");

  } catch {
    document.getElementById("statsBox").innerText = "Stats error";
  }
}

/* -------------------------
   START
--------------------------*/
loadData();

setInterval(loadData, 5000);

</script>

</body>
</html>
