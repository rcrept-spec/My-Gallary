<!DOCTYPE html>
<html>
<head>
  <title>Analytics Dashboard</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 { margin-bottom: 10px; }
 
    .controls {
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    select, button {
      padding: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 13px;
    }

    th {
      background: #222;
      color: white;
      text-align: left;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    .stats {
      margin: 10px 0 20px 0;
      padding: 10px;
      background: white;
    }
  </style>
</head>

<body>

<h2>Click Tracking Dashboard</h2>

<div class="stats" id="statsBox">Loading stats...</div>

<div class="controls">
  <select id="linkFilter">
    <option value="">All Links</option>
    <option value="pro_001">Projects</option>
    <option value="gal_001">Gallery</option>
    <option value="per_001">Personal</option>
  </select>

  <select id="countryFilter">
    <option value="">All Countries</option>
  </select>

  <select id="botFilter">
    <option value="">All Traffic</option>
    <option value="human">Humans Only</option>
    <option value="bot">Bots Only</option>
  </select>

  <button onclick="load()">Apply</button>
</div>

<table>
  <thead>
    <tr>
      <th>Link</th>
      <th>Country</th>
      <th>Region</th>
      <th>City</th>
      <th>Timezone</th>
      <th>IP</th>
      <th>Referrer</th>
      <th>User Agent</th>
      <th>Bot</th>
      <th>Score</th>
    </tr>
  </thead>

  <tbody id="rows"></tbody>
</table>

<script>
/* -----------------------------
   ADMIN PASSWORD (CHANGE THIS)
------------------------------*/
const ADMIN_PASSWORD = "tracker";

/* -----------------------------
   SIMPLE LOGIN GATE
------------------------------*/
const saved = localStorage.getItem("admin_auth");

if (saved !== ADMIN_PASSWORD) {
  const input = prompt("Enter admin password:");

  if (input !== ADMIN_PASSWORD) {
    document.body.innerHTML = "<h2>Access Denied</h2>";
    throw new Error("Unauthorized");
  }

  localStorage.setItem("admin_auth", input);
}

/* -----------------------------
   CONFIG
------------------------------*/
const SUPABASE_URL = "https://binkfreyivymomsuhtiw.supabase.co";

/* -----------------------------
   LOAD STATS
------------------------------*/
async function loadStats() {
  try {
    const res = await fetch("/api/stats");
    const data = await res.json();

    let html = "<b>Clicks per link:</b><br>";
    for (const key in data) {
      html += `${key}: ${data[key]}<br>`;
    }

    document.getElementById("statsBox").innerHTML = html;
  } catch {
    document.getElementById("statsBox").innerHTML = "Stats failed";
  }
}

/* -----------------------------
   LOAD TABLE DATA
------------------------------*/
async function load() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/clicks?select=*&order=created_at.desc`
  );

  let data = await res.json();

  const linkFilter = document.getElementById("linkFilter").value;
  const countryFilter = document.getElementById("countryFilter").value;
  const botFilter = document.getElementById("botFilter").value;

  if (linkFilter) data = data.filter(d => d.link_id === linkFilter);
  if (countryFilter) data = data.filter(d => d.country === countryFilter);
  if (botFilter === "human") data = data.filter(d => !d.is_bot);
  if (botFilter === "bot") data = data.filter(d => d.is_bot);

  const rows = document.getElementById("rows");
  rows.innerHTML = "";

  const countries = new Set();

  data.forEach(r => {
    if (r.country) countries.add(r.country);

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.link_id || ""}</td>
      <td>${r.country || ""}</td>
      <td>${r.region || ""}</td>
      <td>${r.city || ""}</td>
      <td>${r.timezone || ""}</td>
      <td>${r.ip || ""}</td>
      <td>${r.referrer || ""}</td>
      <td>${r.user_agent || ""}</td>
      <td>${r.is_bot ? "YES" : "NO"}</td>
      <td>${r.bot_score || 0}</td>
    `;

    rows.appendChild(tr);
  });

  const countrySelect = document.getElementById("countryFilter");
  const existing = new Set([...countrySelect.options].map(o => o.value));

  countries.forEach(c => {
    if (!existing.has(c)) {
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    }
  });
}

/* -----------------------------
   INIT
------------------------------*/
loadStats();
load();

setInterval(() => {
  loadStats();
  load();
}, 5000);
</script>

</body>
</html>
