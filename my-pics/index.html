<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Pics</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>

<header>
  <h1>My Pics</h1>
  <p>Image gallery</p>
</header>

<div class="topbar">
  <div class="nav-inner">
    <a href="/">Home</a>
    <a href="/projects/">Projects</a>
    <a href="/personal-projects/">Personal Projects</a>
    <a href="/my-pics/">My Pics</a>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2>Gallery</h2>
    <p>Click any image to expand.</p>
  </div>

  <div class="grid">
    <img src="/assets/img1.jpg" onclick="openLightbox(this.src)">
    <img src="/assets/img2.jpg" onclick="openLightbox(this.src)">
    <img src="/assets/img3.jpg" onclick="openLightbox(this.src)">
    <img src="/assets/img4.jpg" onclick="openLightbox(this.src)">
    <img src="/assets/img5.jpg" onclick="openLightbox(this.src)">
    <img src="/assets/img6.jpg" onclick="openLightbox(this.src)">
  </div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script src="/script.js"></script>

</body>
</html>
