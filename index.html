<!DOCTYPE html>
<html>
<head>
  <title>Home</title>

  <style>
    /* ---------------- CORE THEME ---------------- */
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: #eee;
    }

    header {
      background: #1a1a1a;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 15px;
      background: #1e1e1e;
      padding: 10px;
    }

    nav a {
      color: #ddd;
      text-decoration: none;
    }

    nav a:hover {
      color: white;
    }

    .content {
      padding: 20px;
    }

    .card {
      background: #222;
      padding: 15px;
      margin: 10px 0;
      border-radius: 4px;
    }

    /* ---------------- ADMIN BUTTON ---------------- */
    .admin-link {
      position: fixed;
      bottom: 12px;
      right: 12px;
      z-index: 9999;
      background: #333;
      color: white;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.85;
    }

    .admin-link:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

<header>
  <h1>My Website</h1>
</header>

<nav>
  <a href="/projects/">Projects</a>
  <a href="/my-pics/">Gallery</a>
  <a href="/personal-projects/">Adult Projects</a>
</nav>

<div class="content">
  <h2>Welcome</h2>

  <div class="card">
    Main landing content
  </div>
</div>

<!-- ADMIN BUTTON -->
<div class="admin-link" onclick="window.location.href='/admin'">
  admin
</div>

</body>
</html>
